services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-eda-app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://agentic:agentic@postgres:5432/agentic_eda
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: agentic-eda-postgres
    environment:
      POSTGRES_DB: agentic_eda
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: agentic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic -d agentic_eda"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: agentic-eda-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
